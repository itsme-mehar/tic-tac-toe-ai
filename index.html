<!--
  ═══════════════════════════════════════════════════════════════════════════
  🐸  Froggy Tic-Tac-Toe — HYBRID (unbeatable minimax + LLM trash-talk)
  ═══════════════════════════════════════════════════════════════════════════

  HOW THE "AI" WORKS NOW — two jobs, two tools:
    • THE MOVE  → minimax, an exact algorithm that runs in YOUR browser.
                  It plays perfectly and cannot lose. No network needed.
    • THE VOICE → the cloud LLM (via /api/move). It does NOT decide moves
                  anymore — it just writes a witty one-line comment as the
                  character "Blossom 🌸". Pure flavor.

  KEY PROPERTY: because the move comes from minimax (local), the game still
  plays perfectly even if the LLM/server is unreachable — you just get a
  canned line instead of a generated one.

  Still deployed the same way: index.html at the root, api/move.js in /api.
  ═══════════════════════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Froggy Tic-Tac-Toe vs Blossom</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: #e8f4f8;
    display: flex; flex-direction: column; align-items: center;
    min-height: 100vh; margin: 0; padding: 24px 12px;
  }
  .card {
    background: #bfe3f0;
    width: 380px; max-width: 100%;
    padding: 26px 22px 22px;
    border-radius: 28px;
    box-shadow: 0 10px 30px rgba(95,122,85,0.25);
    text-align: center;
  }
  .title { font-size: 21px; font-weight: 800; color: #5f7a55; margin-bottom: 2px; }
  .subtitle { font-size: 13px; color: #7a9a6f; margin-bottom: 16px; }
  #status {
    font-size: 17px; color: #5f7a55; font-weight: 600;
    min-height: 26px; margin-bottom: 14px;
  }
  #grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; margin-bottom: 4px;
  }
  .cell {
    aspect-ratio: 1 / 1;
    background: #fdf9f1; border: none; border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-size: 46px; cursor: pointer;
    box-shadow: 0 4px 8px rgba(95,122,85,0.18);
    transition: transform .12s, box-shadow .2s, opacity .2s;
  }
  .cell:not(:disabled):hover { transform: scale(1.06); }
  .cell:disabled { cursor: default; }
  .cell:focus-visible { outline: 3px solid #5f7a55; outline-offset: 2px; }
  .cell.frog   { background: #cdeccb; }
  .cell.flower { background: #f7c8d8; }
  .cell.win    { box-shadow: 0 0 0 4px #9fd17f; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
  #thinking {
    height: 24px; margin: 10px 0 2px;
    font-size: 14px; color: #5f7a55; font-weight: 600;
    display: none; align-items: center; justify-content: center; gap: 8px;
  }
  #thinking .dot { display:inline-block; animation: pulse 1.2s ease-in-out infinite; }
  .controls { display: flex; gap: 10px; justify-content: center; margin-top: 14px; }
  button.action {
    padding: 11px 22px; font-size: 15px; font-weight: 700;
    color: #fff; background: #9fd17f; border: none; border-radius: 16px;
    cursor: pointer; box-shadow: 0 4px 0 #7fb85f;
  }
  button.action:active { transform: translateY(2px); box-shadow: 0 2px 0 #7fb85f; }
  .speech {
    margin-top: 18px; background: #fdf9f1; border-radius: 16px;
    padding: 14px 16px; text-align: left; width: 380px; max-width: 100%;
  }
  .speech .label { font-size: 12px; font-weight: 700; color: #7a9a6f; margin-bottom: 6px; }
  #speech {
    font-size: 15px; color: #3d5c33; line-height: 1.45; min-height: 22px; font-style: italic;
  }
  .endpoint { font-size: 11px; color: #8aa0b0; margin-top: 14px; text-align: center; max-width: 380px; }
  @media (prefers-reduced-motion: reduce) {
    .cell, button.action, #thinking .dot { transition: none; animation: none; }
  }
</style>
</head>
<body>

  <div class="card">
    <div class="title">🐸 Froggy Tic-Tac-Toe</div>
    <div class="subtitle">You 🐸 &nbsp;vs&nbsp; Blossom 🌸 — the unbeatable one</div>

    <div id="status">Your turn — tap a square 🐸</div>

    <div id="grid"></div>

    <div id="thinking"><span class="dot">🌸</span> Blossom is thinking of a comeback…</div>

    <div class="controls">
      <button class="action" id="newGameBtn">New Game 🍃</button>
    </div>
  </div>

  <div class="speech">
    <div class="label">🌸 Blossom says</div>
    <div id="speech">Think you can beat me? Go on, frog. Make your move.</div>
  </div>

  <div class="endpoint" id="endpointLabel"></div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ═══════════════════════════════════════════════════════════════════════════
const ENDPOINT = "/api/move";   // our proxy — used ONLY for the trash-talk now

// Blossom's personality. The LLM no longer picks moves; it only writes a line.
const VOICE_PROMPT =
  "You are Blossom 🌸, the witty, slightly cocky voice of an UNBEATABLE tic-tac-toe AI " +
  "playing a human (the frog 🐸). You always play perfectly and literally cannot lose. " +
  "You'll be told the board and the move you just made. Reply with ONE short, playful line " +
  "of commentary or friendly trash-talk — 18 words max, light and fun, never cruel. " +
  "Output only the line: no quotes, no labels, no explanation.";

// ═══════════════════════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════════════════════
const HUMAN = "🐸";
const AI    = "🌸";
const WIN_LINES = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

let board = Array(9).fill("");
let locked = false;
let gameOver = false;

// ── DOM references ──────────────────────────────────────────────────────────
const grid       = document.getElementById("grid");
const statusEl   = document.getElementById("status");
const thinkingEl = document.getElementById("thinking");
const speechEl   = document.getElementById("speech");
document.getElementById("endpointLabel").textContent =
  "Moves: minimax (runs in your browser, unbeatable) · Banter: Llama 3.3 70B via Groq";
document.getElementById("newGameBtn").onclick = newGame;

// ── Build the 9 cells ─────────────────────────────────────────────────────────
const cells = [];
for (let i = 0; i < 9; i++) {
  const b = document.createElement("button");
  b.className = "cell";
  b.setAttribute("aria-label", "square " + (i + 1));
  b.onclick = () => humanMove(i);
  cells.push(b);
  grid.appendChild(b);
}

// ═══════════════════════════════════════════════════════════════════════════
//  RENDER
// ═══════════════════════════════════════════════════════════════════════════
function render(winLine) {
  board.forEach((val, i) => {
    const c = cells[i];
    c.textContent = val;
    c.classList.toggle("frog",   val === HUMAN);
    c.classList.toggle("flower", val === AI);
    c.classList.remove("win");
    c.disabled = (val !== "") || locked || gameOver;
  });
  if (winLine) winLine.forEach(i => cells[i].classList.add("win"));
}

// ═══════════════════════════════════════════════════════════════════════════
//  WINNER CHECKS
// ═══════════════════════════════════════════════════════════════════════════
// Returns the winning line (for highlighting), "draw", or null.
function winningLine() {
  for (const line of WIN_LINES) {
    const [a, b, c] = line;
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return line;
  }
  return board.every(Boolean) ? "draw" : null;
}
// Returns the winning symbol (🐸/🌸), "draw", or null. Used by minimax.
function getWinner() {
  for (const [a, b, c] of WIN_LINES) {
    if (board[a] && board[a] === board[b] && board[a] === board[c]) return board[a];
  }
  return board.every(Boolean) ? "draw" : null;
}

function endIfFinished() {
  const result = winningLine();
  if (!result) return false;
  gameOver = true;
  if (result === "draw") {
    statusEl.textContent = "It's a tie! 🪷";
    render();
  } else {
    const winner = board[result[0]];
    statusEl.textContent = winner === HUMAN ? "You win?! 🎉🐸" : "Blossom wins 🌸";
    render(result);
  }
  return true;
}

// ═══════════════════════════════════════════════════════════════════════════
//  MINIMAX — the unbeatable brain (pure algorithm, runs locally, no network)
// ═══════════════════════════════════════════════════════════════════════════
// It imagines every possible future of the game and scores each: a win for
// Blossom is good (+), a win for the human is bad (-), a draw is neutral (0).
// The "depth" term makes it prefer winning sooner and losing later.
function minimax(depth, isBlossomTurn) {
  const w = getWinner();
  if (w === AI)    return 10 - depth;
  if (w === HUMAN) return depth - 10;
  if (w === "draw") return 0;

  if (isBlossomTurn) {
    let best = -Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = AI;
        best = Math.max(best, minimax(depth + 1, false));
        board[i] = "";          // undo — we were only imagining
      }
    }
    return best;
  } else {
    let best = Infinity;
    for (let i = 0; i < 9; i++) {
      if (board[i] === "") {
        board[i] = HUMAN;
        best = Math.min(best, minimax(depth + 1, true));
        board[i] = "";
      }
    }
    return best;
  }
}

// Try every empty square, score it with minimax, pick the highest.
function bestMove() {
  let bestScore = -Infinity, move = -1;
  for (let i = 0; i < 9; i++) {
    if (board[i] === "") {
      board[i] = AI;
      const score = minimax(0, false);
      board[i] = "";
      if (score > bestScore) { bestScore = score; move = i; }
    }
  }
  return move;
}

// ═══════════════════════════════════════════════════════════════════════════
//  HUMAN MOVE
// ═══════════════════════════════════════════════════════════════════════════
function humanMove(i) {
  if (locked || gameOver || board[i] !== "") return;
  board[i] = HUMAN;
  render();
  if (endIfFinished()) return;
  blossomTurn();
}

// ═══════════════════════════════════════════════════════════════════════════
//  BLOSSOM'S TURN — minimax decides; the LLM only talks
// ═══════════════════════════════════════════════════════════════════════════
async function blossomTurn() {
  locked = true;
  statusEl.textContent = "🌸 Blossom is moving…";
  render();

  // 1) BRAIN: minimax picks a perfect move — instant, local, unbeatable.
  const moveIdx = bestMove();
  board[moveIdx] = AI;
  render();
  const finished = endIfFinished();

  // 2) VOICE: ask the LLM for a comment. The move is already locked in, so if
  //    this fails the game is completely unaffected — we just use a canned line.
  thinkingEl.style.display = "flex";
  let line;
  try {
    line = await getCommentary(moveIdx);
  } catch (e) {
    line = fallbackLine(finished);   // network/LLM down? game's fine, just less witty
  }
  thinkingEl.style.display = "none";
  speechEl.textContent = line;

  if (!finished) {
    locked = false;
    statusEl.textContent = "Your turn — tap a square 🐸";
    render();
  }
}

// Ask our proxy (which calls the cloud LLM) for one line of trash-talk.
async function getCommentary(moveIdx) {
  const sq = moveIdx + 1;
  const w = getWinner();
  let situation;
  if (w === AI)        situation = `You just played square ${sq} and WON the game.`;
  else if (w === "draw") situation = `You just played square ${sq}; the game ended in a draw.`;
  else                 situation = `You just played square ${sq}; the game continues, human's turn next.`;

  const boardText = board
    .map((v, i) => `${i + 1}:${v === HUMAN ? "X" : v === AI ? "O" : "_"}`)
    .join(" ");

  const res = await fetch(ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      temperature: 0.85,   // higher = wittier / more varied
      max_tokens: 60,
      messages: [
        { role: "system", content: VOICE_PROMPT },
        { role: "user",   content: `Board (X = human, O = you): ${boardText}. ${situation} Give your one-line comment.` }
      ]
    })
  });

  if (!res.ok) throw new Error("status " + res.status);
  const data = await res.json();
  const text = (data?.choices?.[0]?.message?.content ?? "").trim();
  if (!text) throw new Error("empty reply");
  return text;
}

// Canned lines used only if the LLM can't be reached. The game never needs these
// to function — they just keep Blossom from going silent.
function fallbackLine(finished) {
  const winning = ["Too easy. 🌸", "Was there ever any doubt?", "GG. Try again, frog. 🐸"];
  const playing = ["Your move, frog. 🐸", "Bold. Predictable, but bold.", "I'm barely trying."];
  const pool = finished ? winning : playing;
  return pool[Math.floor(Math.random() * pool.length)];
}

// ═══════════════════════════════════════════════════════════════════════════
//  NEW GAME
// ═══════════════════════════════════════════════════════════════════════════
function newGame() {
  board = Array(9).fill("");
  locked = false;
  gameOver = false;
  speechEl.textContent = "Think you can beat me? Go on, frog. Make your move.";
  statusEl.textContent = "Your turn — tap a square 🐸";
  render();
}

newGame();
</script>
</body>
</html>
